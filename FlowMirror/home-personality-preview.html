<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页人格卡片预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; padding: 40px; max-width: 900px; margin: 0 auto; }
.preview-label { font-size: 14px; color: #f59e0b; font-weight: 700; margin-bottom: 16px; }

/* 模拟统计卡片行 */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.stat-value { font-size: 28px; font-weight: 800; color: #1a1a2e; }
.stat-label { font-size: 12px; color: #999; margin-top: 4px; }

/* 人格卡片 */
.personality-home-card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
}
.personality-home-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}
.personality-home-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, #6B5CE7, #8B7CF7);
    border-radius: 4px 0 0 4px;
}

.personality-icon-box {
    width: 72px; height: 72px;
    border-radius: 18px;
    background: linear-gradient(135deg, #10b981, #14b8a6);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 6px 20px rgba(16,185,129,0.25);
    flex-shrink: 0;
}

.personality-info { flex: 1; }
.personality-label { font-size: 12px; color: #999; margin-bottom: 4px; letter-spacing: 1px; }
.personality-name { font-size: 24px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
.personality-desc { font-size: 13px; color: #888; line-height: 1.6; }

.personality-stats-mini {
    display: flex; gap: 20px; flex-shrink: 0;
}
.mini-stat { text-align: center; }
.mini-stat-value { font-size: 20px; font-weight: 800; color: #1a1a2e; }
.mini-stat-label { font-size: 11px; color: #999; margin-top: 2px; }

.personality-arrow {
    color: #ccc; font-size: 20px; flex-shrink: 0; margin-left: 8px;
}

/* 快速操作区 */
.actions-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.action-btn { background: #fff; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); font-size: 13px; color: #666; }
</style>
</head>
<body>

<div class="preview-label">⬇️ 新增位置：统计卡片行 和 快速操作区 之间</div>

<!-- 模拟统计卡片 -->
<div class="stats-row">
    <div class="stat-card"><div class="stat-value">35</div><div class="stat-label">今日摆烂指数</div></div>
    <div class="stat-card"><div class="stat-value">4.5</div><div class="stat-label">有效工作时间 (小时)</div></div>
    <div class="stat-card"><div class="stat-value">12</div><div class="stat-label">软件切换次数</div></div>
    <div class="stat-card"><div class="stat-value">90</div><div class="stat-label">最长连续时间 (分钟)</div></div>
</div>

<!-- 新增：人格卡片 -->
<div class="personality-home-card" onclick="alert('跳转到人格总结页')">
    <div class="personality-icon-box">☯️</div>
    <div class="personality-info">
        <div class="personality-label">我的摆烂人格</div>
        <div class="personality-name">佛系打工</div>
        <div class="personality-desc">随缘工作，随缘摆烂，一切看心情。摆烂指数 45，这种节奏其实挺健康的。</div>
    </div>
    <div class="personality-stats-mini">
        <div class="mini-stat">
            <div class="mini-stat-value">50</div>
            <div class="mini-stat-label">累计分钟</div>
        </div>
        <div class="mini-stat">
            <div class="mini-stat-value">5</div>
            <div class="mini-stat-label">切换次数</div>
        </div>
        <div class="mini-stat">
            <div class="mini-stat-value">3</div>
            <div class="mini-stat-label">使用应用</div>
        </div>
    </div>
    <div class="personality-arrow">›</div>
</div>

<!-- 模拟快速操作 -->
<div class="actions-row">
    <div class="action-btn">📊 生成今日行为数据</div>
    <div class="action-btn">📈 分析我的一天</div>
    <div class="action-btn">📅 查看历史记录</div>
    <div class="action-btn">🐱 宠物中心</div>
</div>

</body>
</html>
