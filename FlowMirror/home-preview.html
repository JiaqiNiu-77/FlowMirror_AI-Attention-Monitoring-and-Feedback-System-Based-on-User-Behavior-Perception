<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页修改预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; padding: 40px; }
.preview-label { font-size: 14px; color: #f59e0b; font-weight: 700; margin-bottom: 12px; }
.card { background: #fff; border-radius: 20px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 700px; }
.greeting { font-size: 14px; color: #888; margin-bottom: 8px; }
h1 { font-size: 28px; font-weight: 800; color: #1a1a2e; line-height: 1.4; margin-bottom: 12px; }
.highlight { color: #6B5CE7; }
.desc { font-size: 15px; color: #888; line-height: 1.7; margin-bottom: 16px; }
.cta-text { font-size: 16px; color: #6B5CE7; font-weight: 700; padding: 12px 20px; background: #f5f3ff; border-radius: 12px; display: inline-block; border-left: 4px solid #6B5CE7; }
.arrow { color: #f59e0b; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>

<div class="preview-label">⬇️ 修改位置：首页欢迎卡片描述文字下方</div>

<div class="card">
    <div class="greeting">下午好，欢迎回来</div>
    <h1>让我们一起追踪你的<br><span class="highlight">工作状态</span></h1>
    <p class="desc">FlowMirror 帮你监测软件使用行为，分析摆烂指数，让你更了解自己的工作习惯。</p>
    <div class="cta-text">✨ 快来解锁你的"摆烂人格"吧！</div>
    <div class="arrow">↑ 新增内容（紫色高亮提示条）</div>
</div>

</body>
</html>
